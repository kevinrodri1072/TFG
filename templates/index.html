<!DOCTYPE html>
<html>
<head>
    <title>Digital Twin Network</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        #network {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }

        /* Floating popup */
        #node-popup {
            display: none;
            position: fixed;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 8px 12px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            z-index: 500;
            min-width: 120px;
        }
        #node-popup .popup-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }
        #node-popup .popup-info {
            font-size: 12px;
            color: #555;
            margin-bottom: 6px;
            line-height: 1.6;
        }
        #node-popup button {
            display: block;
            width: 100%;
            margin: 3px 0;
            padding: 4px 8px;
            cursor: pointer;
        }

        /* Adjacency matrix modal */
        #matrix-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow: auto;
        }
        #matrix-modal .content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            width: 90%;
            max-width: 900px;
            border-radius: 8px;
            max-height: 80vh;
            overflow-y: auto;
        }
        #matrix-modal h2 { margin-top: 0; }
        #matrix-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }
        #matrix-table th, #matrix-table td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: center;
        }
        #matrix-table th { background-color: #f0f0f0; font-weight: bold; }
        #matrix-table td.cell-host   { background-color: #d4edda; color: #155724; }
        #matrix-table td.cell-router { background-color: #cce5ff; color: #004085; }
        #matrix-table td.cell-switch { background-color: #fff3cd; color: #856404; }
        #matrix-table td.cell-empty  { color: #aaa; }
    </style>
</head>
<body>
    <h1>Digital Twin Network</h1>
    <div id="controls">
        <button onclick="showRouterForm()">Add Router</button>
        <button onclick="showMatrix()">View Matrix</button>
        <button onclick="saveNetwork()">Save Network</button>
        <button onclick="document.getElementById('load-input').click()">Load Network</button>
        <input type="file" id="load-input" accept=".mat" style="display:none" onchange="loadNetwork(this)">
    </div>

    <!-- Floating popup when hovering a node -->
    <div id="node-popup">
        <div class="popup-title" id="popup-title"></div>
        <div class="popup-info" id="popup-info"></div>
        <!-- Default view: buttons -->
        <div id="popup-buttons">
            <button id="btn-add-host" style="display:none" onclick="showAddHostInput()">Add Host</button>
            <button onclick="removeSelectedNode()">Remove</button>
        </div>
        <!-- Add host view: inline input -->
        <div id="popup-add-host" style="display:none">
            <input type="text" id="host-name" placeholder="Name (e.g. h6)" style="width:100%; margin: 4px 0;">
            <input type="hidden" id="host-router">
            <button onclick="addHost()">Confirm</button>
            <button onclick="closeAddHostInput()">Cancel</button>
        </div>
    </div>

    <!-- Add router form -->
    <div id="router-form" style="display:none; border:1px solid #ccc; padding:10px; margin:10px 0;">
        <h3>Add new router</h3>
        <input type="text" id="router-name" placeholder="Name (e.g. r3)">
        <select id="connected-router" multiple></select>
        <button onclick="addRouter()">Confirm</button>
        <button onclick="closeRouterForm()">Cancel</button>
    </div>

    <!-- Adjacency matrix modal -->
    <div id="matrix-modal">
        <div class="content">
            <h2>Adjacency Matrix</h2>
            <label style="font-size:13px; margin-bottom:8px; display:inline-block;">
                <input type="checkbox" id="show-switches" onchange="renderMatrix()" checked>
                Show switches
            </label>
            <div style="overflow-x: auto;">
                <table id="matrix-table"></table>
            </div>
            <br>
            <button onclick="closeMatrix()">Close</button>
        </div>
    </div>

    <div id="network"></div>

    <script>
        var selectedNode = null;
        var topologyData = null;

        fetch('/topology')
            .then(response => response.json())
            .then(data => {
                topologyData = data;
                var nodes = new vis.DataSet(
                    Object.keys(data.nodes)
                        .filter(name => data.nodes[name].type !== 'switch')
                        .map(name => {
                            var type = data.nodes[name].type;
                            var image = type === 'host' ? '/static/host.png' : '/static/router.png';
                            return { id: name, label: name, shape: 'image', image: image, size: 30 };
                        })
                );
                var edges = new vis.DataSet(
                    data.links.filter(link =>
                        data.nodes[link.from].type !== 'switch' &&
                        data.nodes[link.to].type !== 'switch'
                    ).map(link => ({ from: link.from, to: link.to }))
                );
                var container = document.getElementById('network');
                var network = new vis.Network(container, {nodes: nodes, edges: edges}, {
                    interaction: { navigationButtons: false, keyboard: false, hover: true }
                });

                // Show popup on hover
                network.on('hoverNode', function(params) {
                    var popup = document.getElementById('node-popup');
                    selectedNode = params.node;
                    var type = topologyData.nodes[selectedNode].type;

                    var x = params.event.clientX;
                    var y = params.event.clientY;
                    popup.style.left = (x + 10) + 'px';
                    popup.style.top  = (y - 10) + 'px';

                    document.getElementById('popup-title').textContent = selectedNode + ' (' + type + ')';
                    document.getElementById('btn-add-host').style.display = type === 'router' ? 'block' : 'none';

                    // Show node info
                    var infoDiv = document.getElementById('popup-info');
                    var nodeProps = topologyData.nodes[selectedNode];
                    if (type === 'host') {
                        infoDiv.innerHTML = 'IP: ' + nodeProps.ip + '<br>GW: ' + nodeProps.gw;
                    } else if (type === 'router') {
                        infoDiv.innerHTML = 'eth0: ' + nodeProps.ips.eth0 + '<br>eth1: ' + nodeProps.ips.eth1;
                    }

                    // Reset popup to default buttons view
                    document.getElementById('popup-buttons').style.display = 'block';
                    document.getElementById('popup-add-host').style.display = 'none';

                    popup.style.display = 'block';
                });

                // Hide popup when mouse leaves node
                network.on('blurNode', function(params) {
                    setTimeout(function() {
                        var popup = document.getElementById('node-popup');
                        if (!popup.matches(':hover')) {
                            popup.style.display = 'none';
                            selectedNode = null;
                        }
                    }, 100);
                });
            });

        // Close popup when mouse leaves it
        document.getElementById('node-popup').addEventListener('mouseleave', function() {
            this.style.display = 'none';
            selectedNode = null;
        });

        function removeSelectedNode() {
            document.getElementById('node-popup').style.display = 'none';
            if (selectedNode && confirm('Do you want to remove ' + selectedNode + '?')) {
                fetch('/remove_node', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: selectedNode})
                })
                .then(response => response.json())
                .then(data => { if (data.ok) location.reload(); });
            }
        }

        function showAddHostInput() {
            document.getElementById('host-name').value = '';
            document.getElementById('host-router').value = selectedNode;
            document.getElementById('popup-buttons').style.display = 'none';
            document.getElementById('popup-add-host').style.display = 'block';
        }

        function closeAddHostInput() {
            document.getElementById('popup-add-host').style.display = 'none';
            document.getElementById('popup-buttons').style.display = 'block';
        }

        function addHost() {
            var name = document.getElementById('host-name').value;
            var router = document.getElementById('host-router').value;
            fetch('/add_host', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, router: router})
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) { location.reload(); }
                else alert(data.error);
            });
        }

        function showRouterForm() {
            fetch('/topology')
                .then(response => response.json())
                .then(data => {
                    var select = document.getElementById('connected-router');
                    select.innerHTML = '';
                    Object.keys(data.nodes).forEach(name => {
                        if (data.nodes[name].type === 'router') {
                            var option = document.createElement('option');
                            option.value = name;
                            option.textContent = name;
                            select.appendChild(option);
                        }
                    });
                });
            document.getElementById('router-form').style.display = 'block';
        }

        function closeRouterForm() {
            document.getElementById('router-form').style.display = 'none';
        }

        function addRouter() {
            var name = document.getElementById('router-name').value;
            var select = document.getElementById('connected-router');
            var connectedRouters = Array.from(select.selectedOptions).map(o => o.value);
            fetch('/add_router', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, connected_routers: connectedRouters})
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) { closeRouterForm(); location.reload(); }
                else alert(data.error);
            });
        }

        var matrixData = null;

        function showMatrix() {
            fetch('/matrix')
                .then(response => response.json())
                .then(data => {
                    matrixData = data;
                    renderMatrix();
                    document.getElementById('matrix-modal').style.display = 'block';
                });
        }

        function renderMatrix() {
            if (!matrixData) return;
            var showSwitches = document.getElementById('show-switches').checked;
            var names = matrixData.names;
            var matrix = matrixData.matrix;

            var indices, filteredNames;
            if (showSwitches) {
                indices = names.map((_, i) => i);
                filteredNames = names;
            } else {
                indices = names.map((n, i) => ({ n, i }))
                               .filter(x => !x.n.startsWith('sw'))
                               .map(x => x.i);
                filteredNames = indices.map(i => names[i]);
            }

            var table = document.getElementById('matrix-table');
            table.innerHTML = '';

            // Header row
            var header = '<tr><th></th>';
            filteredNames.forEach(name => header += `<th>${name}</th>`);
            header += '</tr>';
            table.innerHTML += header;

            // Data rows
            indices.forEach(i => {
                var tr = `<tr><th>${names[i]}</th>`;
                indices.forEach(j => {
                    var cell;
                    if (!showSwitches) {
                        var typeI = names[i].startsWith('r') ? 'router' : 'host';
                        if (i === j) {
                            cell = 0;
                        } else if (matrix[i][j] !== 0) {
                            cell = matrix[i][j];
                        } else {
                            var commonSwitch = names.findIndex((n, k) =>
                                n.startsWith('sw') && matrix[i][k] !== 0 && matrix[j][k] !== 0
                            );
                            cell = commonSwitch !== -1 ? typeI : 0;
                        }
                    } else {
                        cell = matrix[i][j];
                    }

                    if (cell === 0)             tr += `<td class="cell-empty">0</td>`;
                    else if (cell === 'host')   tr += `<td class="cell-host">host</td>`;
                    else if (cell === 'router') tr += `<td class="cell-router">router</td>`;
                    else if (cell === 'switch') tr += `<td class="cell-switch">switch</td>`;
                    else                        tr += `<td>${cell}</td>`;
                });
                tr += '</tr>';
                table.innerHTML += tr;
            });
        }

        function closeMatrix() {
            document.getElementById('matrix-modal').style.display = 'none';
        }

        function saveNetwork() {
            var a = document.createElement('a');
            a.href = '/export';
            a.download = 'network.mat';
            a.click();
        }

        function loadNetwork(input) {
            var file = input.files[0];
            if (!file) return;

            var formData = new FormData();
            formData.append('file', file);

            fetch('/load_network', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    // Wait for Mininet to restart then reload
                    setTimeout(() => location.reload(), 4000);
                } else {
                    alert('Error loading network: ' + data.error);
                }
            });

            // Reset input so the same file can be loaded again
            input.value = '';
        }
    </script>
</body>
</html>
